<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcel Tracker - Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📦 Parcel Tracker - Admin Dashboard</h1>

<input type="text" id="sender" placeholder="Sender Name"><br><br>

<input type="text" id="receiver" placeholder="Receiver Name"><br><br>

<input type="text" id="location" placeholder="Current Location"><br><br>

<select id="status">
    <option>Parcel Received</option>
    <option>In Transit</option>
    <option>Out for Delivery</option>
    <option>Delivered</option>
</select>

<br><br>

<button id="createParcel">Create Parcel</button>

<div id="message"></div>

<script type="module" src="firebase.js"></script>
<script type="module" src="admin.js"></script>

</body>
</html>
