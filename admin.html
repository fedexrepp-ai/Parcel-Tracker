<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwiftParcel Logistics - Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  
</head>

<body>

<header class="admin-header">

<div class="admin-brand">

<img src="logo.png" class="logo">

<div>

<h1>SwiftParcel Logistics</h1>

<p>Administration Dashboard</p>

</div>
 
</div>

<button id="logoutBtn">Logout</button>

</header>
<section class="dashboard-stats">

    <div class="dashboard-card">
        <h2 id="totalParcels">0</h2>
        <p>Total Shipments</p>
    </div>

    <div class="dashboard-card">
        <h2 id="inTransit">0</h2>
        <p>In Transit</p>
    </div>

    <div class="dashboard-card">
        <h2 id="delivered">0</h2>
        <p>Delivered</p>
    </div>

    <div class="dashboard-card">
        <h2 id="pending">0</h2>
        <p>Pending</p>
    </div>

</section>
  
<div class="dashboard">

<div class="stats">

<section class="recent-activity">

    <h2>Recent Shipment Activity</h2>

    <div id="activityList">

        <div class="activity-item">
            No recent updates yet.
        </div>

    </div>

</section>

  
<section class="admin-panel">

<h2>🔍 Search Shipment</h2>

<input
type="text"
id="searchTracking"
placeholder="Tracking Number">

<button id="loadShipment">
Load Shipment
</button>
<button id="deleteParcel" class="delete-btn">
Delete Shipment
</button>
</section>

<section class="admin-panel">

<h2>Create / Update Shipment</h2>

<input type="text" id="sender" placeholder="Sender Name">

<input type="text" id="senderAddress" placeholder="Sender Address">

<input type="text" id="receiver" placeholder="Receiver Name">

<input type="text" id="receiverAddress" placeholder="Receiver Address">

<input type="text" id="parcelType" placeholder="Parcel Type">

<input type="text" id="weight" placeholder="Weight (kg)">

<input type="text" id="origin" placeholder="Origin">

<input type="text" id="destination" placeholder="Destination">

<input type="text" id="location" placeholder="Current Location">

<input
type="date"
id="deliveryDate">

<textarea
id="description"
placeholder="Tracking Update Description"
rows="4"></textarea>

<select id="status">

<option>Shipment Created</option>
<option>Picked Up</option>
<option>In Transit</option>
<option>Custom Check</option>
<option>Out for Delivery</option>
<option>Delivered</option>
<option>Other</option>

</select>

<input
type="text"
id="customStatus"
placeholder="Custom Status">

<br><br>

<button id="createParcel">
Create Shipment
</button>

<button id="updateParcel">
Update Shipment
</button>

<div id="message"></div>

</section>

<section class="admin-panel">

<h2>Recent Shipments</h2>

<div id="shipmentList">

Loading shipments...

</div>

</section>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
