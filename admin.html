<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcel Tracker - Admin</title>
    <link rel="stylesheet" href="style.css">


<body>
<header class="admin-header">

    <div class="admin-brand">
        <img src="logo.png" class="logo">
        <div>
            <h1>SwiftParcel Logistics</h1>
            <p>Administration Dashboard</p>
        </div>
    </div>

    <button id="logoutBtn">Logout</button>

</header>

<div class="dashboard">

    <div class="stats">

        <div class="stat-card">
            <h3>Total Shipments</h3>
            <h2 id="totalShipments">0</h2>
        </div>

        <div class="stat-card">
            <h3>In Transit</h3>
            <h2 id="inTransit">0</h2>
        </div>

        <div class="stat-card">
            <h3>Delivered</h3>
            <h2 id="delivered">0</h2>
        </div>

        <div class="stat-card">
            <h3>Delayed</h3>
            <h2 id="delayed">0</h2>
        </div>

    </div>

    <section class="admin-panel">

        <h2>Create Shipment</h2>

        <!-- Paste all your existing input fields here -->
        <!-- Sender, Receiver, Address, Weight, Status, etc. -->

    </section>

    <section class="admin-panel">

        <h2>Recent Shipments</h2>

        <div id="shipmentList">
            Loading shipments...
        </div>

    </section>

</div>

<script type="module" src="admin.js"></script>
</body>
</html>
