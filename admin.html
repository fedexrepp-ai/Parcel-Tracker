<body>

<h1> Parcel Tracker - Admin Dashboard</h1>

<input type="text" id="sender" placeholder="Sender Name"><br><br>

<input type="text" id="senderAddress" placeholder="Sender Address"><br><br>

<input type="text" id="receiver" placeholder="Receiver Name"><br><br>

<input type="text" id="receiverAddress" placeholder="Receiver Address"><br><br>

<input type="text" id="parcelType" placeholder="Parcel Type"><br><br>

<input type="text" id="weight" placeholder="Weight (kg)"><br><br>

<input type="text" id="origin" placeholder="Origin"><br><br>

<input type="text" id="destination" placeholder="Destination"><br><br>

<input type="text" id="location" placeholder="Current Location"><br><br>

<input type="text" id="location" placeholder="Current Location"><br><br>

<input type="text"
id="description"
placeholder="Tracking Update Description"><br><br>

<input type="date" id="deliveryDate"><br><br>

<select id="status">
    <option>Shipment Created</option>
    <option>Picked Up</option>
    <option>In Transit</option>
    <option>Custom Check</option>
    <option>Out for Delivery</option>
    <option>Delivered</option>
    <option> Other</option>
</select>
<br><br>
    <input type="text" id="customStatus"placeholder="Enter custom status">
<br><br>

<button id="createParcel">Create Parcel</button>

<div id="message"></div>
