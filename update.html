<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Parcel Tracking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<h1> Update Parcel Tracking</h1>

<input id="trackingNumber" placeholder="Tracking Number">

<br><br>

<input id="location" placeholder="Current Location">

<br><br>

<select id="status">
    <option>Shipment Created</option>
    
    <option>Picked Up</option>
    <option>In Transit</option>
    <option>Custom Check</option>
    <option>Out for Delivery</option>
        <option>Delivered</option>
        <option>Other</option>
</select>
    <br><br>
    <input type="text" id="customStatus" placeholder="Enter custom status">

<br><br>

<button id="updateParcel">
    Update Tracking
</button>

<div id="message"></div>


<script type="module" src="firebase.js"></script>
<script type="module" src="update.js"></script>

</body>
</html>
